<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="../css/register.css" />
  </head>
  <body>
    
    <div class="container">
  <div class="form-box">
    <form  action="" id="form-register">
      <h2>Đăng ký tài khoản</h2>
      <p class="sub">Đăng ký tài khoản để sử dụng dịch vụ</p>

      <div class="row">
        <div class="form-group">
          <label>Họ và tên đệm</label>
          <input type="text" id="lastname">
         <div class="error" id="errLastname"></div>
        </div>

        <div class="form-group">
          <label>Tên</label>
          <input type="text" id="firstname">
          <div class="error" id="errFirstname"></div>
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="text" id="email" placeholder="you@company.com">
        <div class="error" id="errEmail"></div>
      </div>

      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" id="password">
        <div class="error" id="errPass"></div>
      </div>

      <div class="form-group">
        <label>Xác nhận mật khẩu</label>
        <input type="password" id="confirm">
        <div class="error" id="errConfirm"></div>
      </div>

      <div class="checkbox">
        <input type="checkbox" id="agree">
        Bạn đồng ý với <a href="#">chính sách và điều khoản</a>
      </div>

      <button type="submit">Đăng ký</button>

      <p class="login">
        Bạn đã có tài khoản? <a href="./login.html">Đăng nhập</a>
      </p>
       <script src="../js/register.js"></script>
    </div>
    </form>
  </body>
</html>
